version: "3.9"

services:
  igscraper:
    image: igscraper
    platform: linux/amd64
    build: .
    
    container_name: igscraper
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "hub.docker.internal:host-gateway"
    volumes:
      - ./:/app
      - ./secrets/gcs-sa.json:/var/secrets/sa.json:ro
      - ./data/chrome-profile:/data/chrome-profile
      - ./outputs:/opt/pugsy/outputs
      - ./config.toml:/app/config.toml:ro
    environment:
      # - DEBUG_ATTACH=1
      - use_docker=true
      - PYTHONPATH=/app/src
      - ENV=development
      - PUGSY_PG_HOST=hub.docker.internal
      - GOOGLE_APPLICATION_CREDENTIALS=/var/secrets/sa.json
      - CHROME_BIN=/opt/chrome-linux64/chrome
      - CHROMEDRIVER_BIN=/opt/chromedriver-linux64/chromedriver
    shm_size: 2gb

    mem_limit: 4g
    mem_reservation: 2g
    ports: # only for testing purpose, remove in prod
      - "5678:5678"

